<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DailyDoseofBCA</title>
  <link rel="icon" href="mylogo.png" type="image/png">
  <script>
    async function openLandingPage() {
      const fallbackPage = "bca-sem5.html";

      try {
        const apiResponse = await fetch(`/api/site-config?v=${Date.now()}`).catch(() => null);
        const response = apiResponse && apiResponse.ok
          ? apiResponse
          : await fetch(`site-config.json?v=${Date.now()}`);
        const config = await response.json();
        const landingPage = config.landingPage || fallbackPage;
        window.location.replace(landingPage);
      } catch (error) {
        window.location.replace(fallbackPage);
      }
    }

    openLandingPage();
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #10131a;
      color: #f8fafc;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      color: #38bdf8;
    }
  </style>
</head>
<body>
  <p>Opening DailyDoseofBCA... <a href="bca-sem5.html">Continue</a></p>
</body>
</html>
