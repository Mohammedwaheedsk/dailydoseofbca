<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>DailyDoseofBCA | Home</title>
  <link rel="icon" href="mylogo.png" type="image/png">
  <link rel="apple-touch-icon" href="mylogo.png">
  <style>
    :root {
      --bg-base: #121212;
      --text-primary: #f5f5f7;
      --text-secondary: #86868b;
      --accent-blue: #0a84ff;
      --glass-panel: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.2);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; user-select: none; }
    body { background-color: #000; color: #fff; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
    
    .blob { position: absolute; border-radius: 50%; filter: blur(140px); z-index: -1; opacity: 0.35; animation: floatAurora 22s infinite ease-in-out alternate; }
    .blob-1 { top: -10%; right: -5%; width: 60vw; height: 60vw; background: radial-gradient(circle, #444 0%, transparent 80%); }
    .blob-2 { bottom: -10%; left: -10%; width: 70vw; height: 70vw; background: radial-gradient(circle, #222 0%, transparent 85%); }
    @keyframes floatAurora { 0% { transform: scale(1); } 50% { transform: scale(1.1) translate(20px, -20px); } 100% { transform: scale(1); } }
    
    .brand { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #fff, #a1a1aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 2rem; }
    
    .sem-grid-container {
      width: 90%;
      max-width: 400px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(40px);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .sem-link {
      background: var(--glass-panel);
      padding: 25px 15px;
      border-radius: 22px;
      border: 1px solid var(--glass-border);
      border-top: 1px solid var(--glass-highlight);
      text-align: center;
      text-decoration: none;
      color: #fff;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .sem-link:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.15);
    }
    
    .sem-num { font-size: 0.8rem; opacity: 0.6; font-weight: 400; text-transform: uppercase; letter-spacing: 1px; }

    .bottom-tag { margin-top: 2rem; font-size: 0.8rem; color: var(--text-secondary); opacity: 0.5; }
    
  </style>
</head>
<body>
  <div class="blob blob-1"></div><div class="blob blob-2"></div>
  <div class="brand">DailyDoseofBCA</div>
  
  <div class="sem-grid-container">
    <a href="bca-sem1.html" class="sem-link">
      <span class="sem-num">Semester</span>
      01
    </a>
    <a href="bca-sem2.html" class="sem-link">
      <span class="sem-num">Semester</span>
      02
    </a>
    <a href="bca-sem3.html" class="sem-link">
      <span class="sem-num">Semester</span>
      03
    </a>
    <a href="bca-sem4.html" class="sem-link">
      <span class="sem-num">Semester</span>
      04
    </a>
    <a href="bca-sem5.html" class="sem-link">
      <span class="sem-num">Semester</span>
      05
    </a>
    <a href="#" class="sem-link" style="opacity: 0.5; pointer-events: none;">
      <span class="sem-num">Semester</span>
      06
    </a>
  </div>
  
  <p class="bottom-tag">Handwritten Notes & Assignments</p>
</body>
</html>
